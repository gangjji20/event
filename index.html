<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>출근길 발자국</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a64a784c1fee78d6e1ec692e82a80162&autoload=false"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF7;color:#2D2A26}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
#lobby{align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FFF5F8,#F0F8FF,#F5FFF0)}
.card{width:100%;max-width:400px;background:#fff;border-radius:28px;padding:36px 28px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.logo{text-align:center;font-size:48px;margin-bottom:8px}
.title{text-align:center;font-size:26px;font-weight:800;margin-bottom:8px}
.sub{text-align:center;font-size:14px;color:#777;margin-bottom:28px}
.label{font-size:13px;font-weight:700;color:#999;margin-bottom:8px}
input{width:100%;font-size:16px;padding:14px;border:1px solid #ddd;border-radius:12px;margin-bottom:18px}
.colors{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.color{aspect-ratio:1;border-radius:50%;border:3px solid transparent;display:flex;align-items:center;justify-content:center}
.color.active{border-color:#222}
button{width:100%;border:0;border-radius:12px;padding:14px;font-size:16px;font-weight:700}
.primary{background:#2D2A26;color:white}
.secondary{background:#F5F3EE;color:#555;margin-top:10px}
.room{background:#F5F3EE;border-radius:16px;padding:18px;text-align:center;margin:18px 0}
.room-code{font-size:32px;font-weight:800;letter-spacing:6px}
.room-link{font-size:12px;color:#6E9ECF;word-break:break-all;margin-top:8px}

.header{height:86px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:#FAFAF7}
.header-title{font-size:22px;font-weight:800}
.badge{display:flex;align-items:center;gap:8px;font-weight:700}
.dot{width:12px;height:12px;border-radius:50%}
.map-wrap{position:relative;margin:0 16px;border-radius:24px;overflow:hidden;background:#eee;box-shadow:0 12px 40px rgba(0,0,0,.08)}
#map{width:100%;height:420px}
.hud{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:10}
.pill{background:white;border-radius:22px;padding:9px 18px;font-weight:800;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.tabs{display:flex;margin:16px;background:#F5F3EE;border-radius:16px;padding:4px}
.tab{background:transparent;color:#777}
.tab.active{background:white;color:#1687E8;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.panel{display:none;margin:0 16px 16px;background:#fff;border-radius:20px;padding:20px}
.panel.active{display:block}
.panel-title{font-weight:800;margin-bottom:16px}
.row{display:flex;align-items:center;gap:14px;padding:12px 0}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.info{flex:1}
.name{font-weight:800}
.small{font-size:14px;color:#777}
.distance{font-weight:800;color:#777}
.event{font-size:14px;color:#555;padding:8px 0;border-bottom:1px solid #eee}
.bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.bingo{aspect-ratio:1;border-radius:12px;background:#F5F3EE;border:1px solid #eee;font-size:12px;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px}
.bingo.hit{background:#B8F0C8;color:#1A5E2A;font-weight:800}
#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#222;color:white;border-radius:24px;padding:12px 20px;font-size:14px;opacity:0;transition:.25s;z-index:9999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<body>

<div id="lobby" class="screen active">
  <div class="card">
    <div class="logo">🐾</div>
    <div class="title">출근길 발자국</div>
    <div class="sub">오늘 출근길도 같이 걸어요</div>

    <div id="step1">
      <div class="label">내 이름</div>
      <input id="nameInput" type="text" maxlength="6" placeholder="이름 입력" autocomplete="off" inputmode="text">

      <div class="label">발자국 색상</div>
      <div id="colorGrid" class="colors"></div>

      <button class="primary" onclick="goStep2()">다음 →</button>
    </div>

    <div id="step2" style="display:none;text-align:center">
      <div style="font-size:56px;margin:16px 0">📍</div>
      <p style="font-size:15px;color:#777;line-height:1.6;margin-bottom:20px">
        위치 공유를 허용하면 내 발자국이<br>
        동료들 지도에 실시간으로 나타나요
      </p>
      <button class="primary" onclick="requestLocation()">위치 공유 허용</button>
      <button class="secondary" onclick="useDemoPos()">데모 위치로 시작</button>
    </div>

    <div id="step3" style="display:none;text-align:center">
      <p style="font-size:15px;color:#777;line-height:1.6">
        동료에게 아래 링크를 공유해요.<br>
        같은 방이면 서로 지도에 보여요 🗺️
      </p>

      <div class="room">
        <div class="label">방 코드</div>
        <div id="roomCodeDisplay" class="room-code"></div>
        <div id="roomLinkDisplay" class="room-link"></div>
      </div>

      <button class="secondary" onclick="copyLink()">링크 복사</button>
      <button class="primary" onclick="enterMap()" style="margin-top:10px">지도 열기 →</button>
    </div>
  </div>
</div>

<div id="mapscreen" class="screen">
  <div class="header">
    <div class="header-title">🐾 출근길 발자국</div>
    <div class="badge"><span id="myDot" class="dot"></span><span id="myNameBadge"></span></div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="hud">
      <div id="hudTime" class="pill">--:--:--</div>
      <div class="pill">발자국 <span id="stepCount">0</span>개</div>
      <div id="hudOnline" class="pill">접속 1명</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('roster')">👥 동료</button>
    <button class="tab" onclick="switchTab('events')">🎉 이벤트</button>
    <button class="tab" onclick="switchTab('bingo')">🎯 빙고</button>
  </div>

  <div id="panel-roster" class="panel active">
    <div class="panel-title">오늘 출근 현황</div>
    <div id="rosterList"></div>
  </div>

  <div id="panel-events" class="panel">
    <div class="panel-title">이벤트 피드</div>
    <div id="eventFeed"></div>
  </div>

  <div id="panel-bingo" class="panel">
    <div class="panel-title">나의 출근 빙고</div>
    <div id="bingoGrid" class="bingo-grid"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const COLORS=[
  '#FFB3B3','#FFD1A9','#FFF0A0','#B8F0C8','#A9D4FF',
  '#C9B8FF','#FFB8E8','#A8EDE8','#FFCBB8','#D8C8FF'
];

const OFFICE={lat:37.5412063,lng:126.9695419,name:'서울광역청년센터'};

const SPOTS=[
  {name:'잇케',lat:37.5401150,lng:126.9676741,emoji:'🎂'},
  {name:'베이커리무이',lat:37.5396354,lng:126.9668649,emoji:'🥐'},
  {name:'헤븐스브래드',lat:37.5253467,lng:126.9628472,emoji:'🍞'},
  {name:'까치네',lat:37.5443320,lng:126.9732218,emoji:'🍳'},
  {name:'다이소',lat:37.5421488,lng:126.9718875,emoji:'🛒'}
];

const DB='https://event-gangjji-default-rtdb.firebaseio.com/';
const RAD=80;

let myId='u_'+Math.random().toString(36).slice(2,8);
let myName='';
let myColor=COLORS[2];
let mySteps=0;
let roomCode='';
let players={};
let overlays={};
let myOverlay=null;
let map=null;
let lastPos=null;
let firstLat=null;
let firstLng=null;
let hits=[false,false,false,false,false];
let toastTimer=null;
let pollingStarted=false;
let gpsStarted=false;

function dbUrl(path){
  return DB+path.replace(/^\/+/,'')+'.json';
}

function fbGet(path){
  return fetch(dbUrl(path)).then(r=>r.json()).catch(()=>null);
}

function fbSet(path,data){
  return fetch(dbUrl(path),{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  }).catch(()=>{});
}

function fbDelete(path){
  return fetch(dbUrl(path),{method:'DELETE'}).catch(()=>{});
}

function initColors(){
  const grid=document.getElementById('colorGrid');
  COLORS.forEach((color,index)=>{
    const el=document.createElement('div');
    el.className='color'+(index===2?' active':'');
    el.style.background=color;
    el.textContent=index===2?'✓':'';
    el.onclick=()=>{
      document.querySelectorAll('.color').forEach(x=>{
        x.classList.remove('active');
        x.textContent='';
      });
      el.classList.add('active');
      el.textContent='✓';
      myColor=color;
    };
    grid.appendChild(el);
  });
}

function goStep2(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){
    showToast('이름을 입력해주세요 😊');
    return;
  }

  myName=name;
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='block';
}

function requestLocation(){
  if(!navigator.geolocation){
    showToast('위치 기능을 사용할 수 없어 데모로 시작해요.');
    useDemoPos();
    return;
  }

  showToast('위치 권한 요청 중...');

  navigator.geolocation.getCurrentPosition(
    pos=>{
      firstLat=pos.coords.latitude;
      firstLng=pos.coords.longitude;
      showToast('위치 공유가 허용됐어요 🐾');
      goStep3();
    },
    err=>{
      showToast('위치 권한이 거부되어 데모로 시작해요.');
      useDemoPos();
    },
    {enableHighAccuracy:true,maximumAge:0,timeout:10000}
  );
}

function useDemoPos(){
  goStep3();
}

function goStep3(){
  const params=new URLSearchParams(location.search);
  roomCode=params.get('room') || Math.random().toString(36).slice(2,7).toUpperCase();

  document.getElementById('step2').style.display='none';
  document.getElementById('step3').style.display='block';
  document.getElementById('roomCodeDisplay').textContent=roomCode;
  document.getElementById('roomLinkDisplay').textContent=location.origin+location.pathname+'?room='+roomCode;
}

function copyLink(){
  const link=document.getElementById('roomLinkDisplay').textContent;
  if(navigator.clipboard) navigator.clipboard.writeText(link);
  showToast('링크를 복사했어요 📋');
}

function enterMap(){
  document.getElementById('lobby').classList.remove('active');
  document.getElementById('mapscreen').classList.add('active');

  if(!window.kakao || !kakao.maps || !kakao.maps.load){
    showToast('카카오맵 로딩 실패: 앱키와 도메인을 확인해주세요.');
    console.error('Kakao Maps SDK load failed');
    return;
  }

  kakao.maps.load(()=>{
    try{
      initMap();
    }catch(e){
      console.error(e);
      showToast('지도 초기화 중 문제가 발생했어요.');
    }
  });
}

function initMap(){
  document.getElementById('myDot').style.background=myColor;
  document.getElementById('myNameBadge').textContent=myName;

  const center=new kakao.maps.LatLng(firstLat || OFFICE.lat, firstLng || OFFICE.lng);

  map=new kakao.maps.Map(document.getElementById('map'),{
    center:center,
    level:4
  });

  setTimeout(()=>map.relayout(),300);

  addLabel(OFFICE.lat,OFFICE.lng,'🏢',OFFICE.name,'#FF8FA3','#fff');

  SPOTS.forEach(spot=>{
    addLabel(spot.lat,spot.lng,spot.emoji,spot.name,'#FFF0A0','#7A5F00');

    new kakao.maps.Circle({
      center:new kakao.maps.LatLng(spot.lat,spot.lng),
      radius:RAD,
      strokeWeight:1,
      strokeColor:'#E8C800',
      strokeOpacity:.7,
      fillColor:'#FFF0A0',
      fillOpacity:.25
    }).setMap(map);
  });

  initBingo();
  startGPS();
  startPolling();
  updateTime();
  setInterval(updateTime,1000);

  window.addEventListener('beforeunload',()=>{
    fbDelete('/rooms/'+roomCode+'/players/'+myId);
  });
}

function addLabel(lat,lng,emoji,text,bg,color){
  const html=
    '<div style="text-align:center;font-size:20px;line-height:1.2">'+
    emoji+
    '<div style="background:'+bg+';color:'+color+';font-size:10px;border-radius:10px;padding:3px 7px;font-weight:700;white-space:nowrap">'+
    text+
    '</div></div>';

  new kakao.maps.CustomOverlay({
    position:new kakao.maps.LatLng(lat,lng),
    content:html,
    yAnchor:1
  }).setMap(map);
}

function makePlayerOverlay(lat,lng,name,color,isMe){
  const html=
    '<div style="text-align:center;pointer-events:none">'+
    '<div style="font-size:22px">'+(isMe?'🧑':'👤')+'</div>'+
    '<div style="background:'+color+';color:#333;font-size:11px;border-radius:12px;padding:3px 8px;font-weight:800;white-space:nowrap">'+
    name+
    '</div></div>';

  const overlay=new kakao.maps.CustomOverlay({
    position:new kakao.maps.LatLng(lat,lng),
    content:html,
    yAnchor:1,
    zIndex:isMe?10:5
  });

  overlay.setMap(map);
  return overlay;
}

function startGPS(){
  if(gpsStarted) return;
  gpsStarted=true;

  if(firstLat && firstLng){
    updatePosition(firstLat,firstLng);
  }else{
    demoMove();
  }

  if(navigator.geolocation){
    navigator.geolocation.watchPosition(
      pos=>updatePosition(pos.coords.latitude,pos.coords.longitude),
      ()=>{},
      {enableHighAccuracy:true,maximumAge:3000,timeout:10000}
    );
  }
}

function demoMove(){
  let lat=OFFICE.lat+(Math.random()-.5)*0.006;
  let lng=OFFICE.lng+(Math.random()-.5)*0.006;

  updatePosition(lat,lng);

  setInterval(()=>{
    const p=players[myId];
    if(p && p.arrived) return;

    const dl=OFFICE.lat-lat;
    const dg=OFFICE.lng-lng;

    lat+=dl*0.04+(Math.random()-.5)*0.00005;
    lng+=dg*0.04+(Math.random()-.5)*0.00005;

    updatePosition(lat,lng);
  },1500);
}

function updatePosition(lat,lng){
  if(!map) return;

  if(lastPos){
    drawFootprints(lastPos.lat,lastPos.lng,lat,lng,myColor);
  }

  lastPos={lat,lng};

  if(!players[myId]){
    players[myId]={
      id:myId,
      name:myName,
      color:myColor,
      lat,
      lng,
      steps:0,
      arrived:false
    };
    myOverlay=makePlayerOverlay(lat,lng,myName,myColor,true);
  }else{
    players[myId].lat=lat;
    players[myId].lng=lng;
    if(myOverlay) myOverlay.setPosition(new kakao.maps.LatLng(lat,lng));
  }

  mySteps++;
  players[myId].steps=mySteps;
  document.getElementById('stepCount').textContent=mySteps*7;

  const dist=distance(lat,lng,OFFICE.lat,OFFICE.lng);

  if(dist<60 && !players[myId].arrived){
    players[myId].arrived=true;
    addEvent(myName+'님 도착! 🏢');
    showToast('출근 완료 🏢');
  }

  SPOTS.forEach((spot,index)=>{
    if(hits[index]) return;

    if(distance(lat,lng,spot.lat,spot.lng)<RAD){
      hits[index]=true;
      updateBingo();
      addEvent('빙고! '+spot.emoji+' '+spot.name+' 통과!');
      showToast(spot.name+' 체크!');
    }
  });

  fbSet('/rooms/'+roomCode+'/players/'+myId,{
    name:myName,
    color:myColor,
    lat,
    lng,
    steps:mySteps,
    arrived:players[myId].arrived
  });

  updateRoster();
}

function drawFootprints(aLat,aLng,bLat,bLng,color){
  for(let i=0;i<3;i++){
    const t=(i+.5)/3;
    const lat=aLat+(bLat-aLat)*t;
    const lng=aLng+(bLng-aLng)*t;

    new kakao.maps.Circle({
      center:new kakao.maps.LatLng(lat,lng),
      radius:2.8,
      strokeWeight:0,
      fillColor:color,
      fillOpacity:.75
    }).setMap(map);
  }
}

function startPolling(){
  if(pollingStarted) return;
  pollingStarted=true;

  setInterval(()=>{
    fbGet('/rooms/'+roomCode+'/players').then(data=>{
      if(!data) return;

      Object.keys(data).forEach(id=>{
        if(id===myId) return;

        const p=data[id];
        const prev=players[id];

        if(!prev){
          players[id]={...p,id};
          overlays[id]=makePlayerOverlay(p.lat,p.lng,p.name,p.color,false);
          addEvent(p.name+'님이 참여했어요!');
        }else{
          if(prev.lat!==p.lat || prev.lng!==p.lng){
            drawFootprints(prev.lat,prev.lng,p.lat,p.lng,p.color);
            players[id]={...players[id],...p};
            if(overlays[id]) overlays[id].setPosition(new kakao.maps.LatLng(p.lat,p.lng));
          }
        }
      });

      Object.keys(players).forEach(id=>{
        if(id!==myId && !data[id]){
          if(overlays[id]) overlays[id].setMap(null);
          delete players[id];
          delete overlays[id];
        }
      });

      updateRoster();
      document.getElementById('hudOnline').textContent='접속 '+Object.keys(players).length+'명';
    });
  },2000);
}

function updateRoster(){
  const list=document.getElementById('rosterList');
  list.innerHTML='';

  Object.keys(players).forEach(id=>{
    const p=players[id];
    const dist=Math.round(distance(p.lat,p.lng,OFFICE.lat,OFFICE.lng));
    const row=document.createElement('div');
    row.className='row';

    row.innerHTML=
      '<div class="avatar" style="background:'+p.color+'33">'+(p.arrived?'😊':'🚶')+'</div>'+
      '<div class="info">'+
      '<div class="name">'+p.name+(id===myId?' <span class="small">(나)</span>':'')+'</div>'+
      '<div class="small">발자국 '+((p.steps||0)*7)+'개</div>'+
      '</div>'+
      '<div class="distance">'+(p.arrived?'도착':dist+'m 남음')+'</div>';

    list.appendChild(row);
  });
}

function initBingo(){
  updateBingo();
}

function updateBingo(){
  const grid=document.getElementById('bingoGrid');
  grid.innerHTML='';

  SPOTS.forEach((spot,index)=>{
    const cell=document.createElement('div');
    cell.className='bingo'+(hits[index]?' hit':'');
    cell.innerHTML=spot.emoji+'<br>'+spot.name;
    grid.appendChild(cell);
  });
}

function addEvent(msg){
  const feed=document.getElementById('eventFeed');
  const row=document.createElement('div');
  row.className='event';
  row.textContent=msg;
  feed.prepend(row);
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((el,index)=>{
    el.classList.toggle('active',['roster','events','bingo'][index]===tab);
  });

  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

function distance(a,b,c,d){
  const R=6371000;
  const lat1=a*Math.PI/180;
  const lat2=c*Math.PI/180;
  const dLat=(c-a)*Math.PI/180;
  const dLng=(d-b)*Math.PI/180;

  const x=
    Math.sin(dLat/2)**2+
    Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function updateTime(){
  const now=new Date();
  document.getElementById('hudTime').textContent=
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
}

function showToast(msg){
  const toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.classList.add('show');

  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),2600);
}

initColors();
</script>
</body>
</html>
