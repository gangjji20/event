<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>출근길 발자국</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">

<!-- ⭐ 네 키 적용 -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b2deec6ccd1fac9ff85410f61759d510&autoload=false"></script>

<style>
body{margin:0;font-family:'Noto Sans KR';background:#FAFAF7}
.screen{display:none;height:100vh}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:#fff;padding:30px;border-radius:20px;width:90%;max-width:400px;text-align:center}
input{width:100%;padding:14px;font-size:16px;border-radius:10px;border:1px solid #ddd;margin-bottom:16px}
button{width:100%;padding:14px;border:none;border-radius:10px;font-weight:700}
.primary{background:#2D2A26;color:#fff}
.secondary{background:#eee;margin-top:10px}
#map{width:100%;height:100vh}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:20px;opacity:0;transition:.3s}
#toast.show{opacity:1}
</style>
</head>

<body>

<!-- 로비 -->
<div id="lobby" class="screen active">
  <div class="card">
    <h2>🐾 출근길 발자국</h2>
    <input id="nameInput" placeholder="이름 입력" maxlength="6">
    <button class="primary" onclick="goStep2()">다음</button>
  </div>
</div>

<!-- 위치 -->
<div id="step2" class="screen">
  <div class="card">
    <p>위치 공유를 허용해주세요 📍</p>
    <button class="primary" onclick="requestLocation()">위치 허용</button>
    <button class="secondary" onclick="startDemo()">데모 시작</button>
  </div>
</div>

<!-- 지도 -->
<div id="mapScreen" class="screen">
  <div id="map"></div>
</div>

<div id="toast"></div>

<script>
let name='';
let map;
let lat=37.5412;
let lng=126.9695;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function goStep2(){
  const v=document.getElementById('nameInput').value.trim();
  if(!v){showToast('이름 입력해주세요');return;}
  name=v;
  document.getElementById('lobby').classList.remove('active');
  document.getElementById('step2').classList.add('active');
}

function requestLocation(){
  if(!navigator.geolocation){
    showToast('위치 기능 없음');
    startDemo();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      lat=pos.coords.latitude;
      lng=pos.coords.longitude;
      startMap();
    },
    ()=>{
      showToast('위치 거부됨 → 데모 실행');
      startDemo();
    }
  );
}

function startDemo(){
  lat=37.5412 + (Math.random()-0.5)*0.01;
  lng=126.9695 + (Math.random()-0.5)*0.01;
  startMap();
}

function startMap(){
  document.getElementById('step2').classList.remove('active');
  document.getElementById('mapScreen').classList.add('active');

  if(!window.kakao || !kakao.maps){
    showToast('카카오맵 로딩 실패 → 도메인 등록 확인');
    console.error('kakao not loaded');
    return;
  }

  kakao.maps.load(()=>{
    const container=document.getElementById('map');

    map=new kakao.maps.Map(container,{
      center:new kakao.maps.LatLng(lat,lng),
      level:3
    });

    new kakao.maps.Marker({
      map:map,
      position:new kakao.maps.LatLng(lat,lng)
    });

    showToast(name+' 위치 표시 완료 🐾');
  });
}
</script>

</body>
</html>
